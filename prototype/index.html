<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus — Life OS</title>
  <meta name="description" content="Seu Sistema Operacional Pessoal de Contexto. Capturar primeiro, organizar depois.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <!-- ═══ Sidebar ═══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header" style="display: flex; align-items: center; justify-content: space-between;">
      <div class="logo">
        <span class="logo-text">Nexus</span>
        <span class="logo-dot"></span>
      </div>
      <!-- Botão global de Captura Rápida -->
      <button class="nav-item" id="quick-capture-btn" style="padding: 6px; margin: 0; background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--radius-sm); box-shadow: var(--shadow-xs); width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;" title="Captura Rápida (+)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item active" data-page="briefing" id="nav-briefing" onclick="navigateTo('briefing')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.5 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V7.5L14.5 2z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <line x1="10" y1="9" x2="8" y2="9"/>
        </svg>
        <span>Briefing</span>
      </a>

      <!-- Inbox Nav Item -->
      <a class="nav-item" data-page="inbox" id="nav-inbox" onclick="navigateTo('inbox')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/>
          <path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/>
        </svg>
        <span style="flex: 1;">Inbox</span>
        <span class="mini-briefing-badge" id="inbox-badge" style="font-size: 10px; padding: 2px 6px; background: var(--accent); color: var(--surface); border-radius: var(--radius-full); display: none;">0</span>
      </a>

      <!-- Radar Nav Item (formerly Dashboard) -->
      <a class="nav-item" data-page="radar" id="nav-radar" onclick="navigateTo('radar')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a10 10 0 0110 10"/>
          <path d="M12 12L22 12"/>
        </svg>
        <span>Radar</span>
      </a>

      <div class="nav-section">
        <span class="nav-section-label">Workspaces</span>
        <div id="sidebar-workspaces"></div>
      </div>
    </nav>

    <div class="sidebar-footer">
      <button class="search-trigger" id="search-trigger" title="Buscar (Ctrl+K)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span>Buscar</span>
        <kbd>Ctrl K</kbd>
      </button>
    </div>
  </aside>

  <!-- ═══ Main Content ═══ -->
  <main class="main-content" id="main-content">
    <div id="page-content"></div>
  </main>

  <!-- ═══ Search Overlay ═══ -->
  <div class="search-overlay" id="search-overlay">
    <div class="search-backdrop" id="search-backdrop"></div>
    <div class="search-modal">
      <div class="search-input-wrapper">
        <svg class="search-input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Buscar em acontecimentos e knowledges..." autocomplete="off" spellcheck="false">
        <kbd class="search-input-kbd">Esc</kbd>
      </div>
      <div id="search-results"></div>
    </div>
  </div>

  <!-- ═══ Quick Capture Modal ═══ -->
  <div class="search-overlay" id="quick-capture-overlay">
    <div class="search-backdrop" id="quick-capture-backdrop"></div>
    <div class="search-modal" style="width: 460px; max-height: 220px; padding: var(--space-5);">
      <h3 style="font-size: var(--font-size-xs); font-weight: var(--font-weight-medium); color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: var(--space-3);">Capturar para o Inbox</h3>
      <textarea id="quick-capture-input" placeholder="Digite uma ideia, decisão ou anotação rápida..." style="width: 100%; height: 80px; border: none; outline: none; resize: none; background: transparent; font-family: inherit; font-size: var(--font-size-base); color: var(--text-primary); line-height: var(--line-height-normal);" autocomplete="off" spellcheck="false"></textarea>
      <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-light); padding-top: var(--space-3); margin-top: var(--space-2);">
        <span style="font-size: var(--font-size-xs); color: var(--text-tertiary);">Pressione <kbd style="font-family: inherit; padding: 2px 6px; border: 1px solid var(--border); border-radius: 4px; background: var(--hover);">Enter</kbd> para registrar</span>
        <button id="quick-capture-save" style="background: var(--accent); color: var(--surface); padding: var(--space-2) var(--space-4); border-radius: var(--radius-sm); font-size: var(--font-size-xs); font-weight: var(--font-weight-medium); transition: background var(--transition-fast);">Registrar</button>
      </div>
    </div>
  </div>

  <!-- ═══ Scripts ═══ -->
  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
  <script src="js/search.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
